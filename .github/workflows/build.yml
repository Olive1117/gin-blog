name: Build

on:
  push:
    branches:
      - main
      - ci
  pull_request:
    branches:
      - main
      - ci
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v2

      - name: 安装环境
        uses: actions/setup-go@v6
        with:
          go-version: 1.25.4
          go-version-file: 'go.mod'
